<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagdambey Clothehouse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
    <h2>Jagdambey Clothehouse</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
    <h1>Elite Clothing for Everyone</h1>
    <p>Best quality clothes at affordable prices</p>
    <img src="images/hero.png" alt="hero image">
</section>

<!-- PRODUCTS -->
<section id="products">
    <h2>Our Products</h2>

    <div class="product-container">

        <div class="product">
            <img src="images/shirt1.jpg" alt="">
            <h3>Red Shirt</h3>
            <p>₹499</p>
        </div>

        <div class="product">
            <img src="images/shirt2.jpg" alt="">
            <h3>Blue Shirt</h3>
            <p>₹599</p>
        </div>

        <div class="product">
            <img src="images/jeans1.jpg" alt="">
            <h3>Jeans</h3>
            <p>₹899</p>
        </div>

        <div class="product">
            <img src="images/tshirt1.jpg" alt="">
            <h3>T-Shirt</h3>
            <p>₹299</p>
        </div>

    </div>
</section>

<!-- BRANDS -->
<section class="brands">
    <h2>Our Brands</h2>
    <div class="brand-logos">
        <img src="images/logo1.png">
        <img src="images/logo1.png">
        <img src="images/logo1.png">
        <img src="images/logo1.png">
    </div>
</section>

<!-- FOOTER -->
<footer id="contact">
    <h3>Jagdambey Clothehouse</h3>
    <p>Contact: 9876543210</p>
    <p>Follow us on social media</p>
</footer>

</body>
</html>
